<section class="bg-primary-900 py-16 md:py-20 relative overflow-hidden">
  <!-- Background Texture (from Rooms) -->
  <div class="absolute inset-0 opacity-20 pointer-events-none">
    <div class="absolute inset-0" style="background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0); background-size: 40px 40px;"></div>
  </div>

  <div class="container mx-auto px-4 lg:px-8 text-center relative z-10">
    <h1 class="text-4xl md:text-6xl font-serif font-bold text-white mb-6 tracking-tight">
      {{ title }}
    </h1>
    <p class="text-xl text-primary-100 max-w-2xl mx-auto font-light leading-relaxed">
      {{ description }}
    </p>
  </div>
</section>
