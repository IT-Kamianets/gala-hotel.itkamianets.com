<section class="py-24 bg-white">
  <div class="container mx-auto px-4 lg:px-8">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
      <div class="space-y-4">
        <h2 class="text-3xl md:text-4xl font-serif font-bold text-secondary-900 leading-tight italic">
          Погляньте на наш затишок
        </h2>
        <div class="w-20 h-1 bg-primary-500 rounded-full"></div>
      </div>
      <a routerLink="/gallery" class="text-primary-600 font-bold hover:text-primary-700 transition-colors flex items-center group text-sm md:text-base">
        Перейти до повної галереї
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </a>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
      @for (item of previewImages; track item.url) {
        <div 
          (click)="openImage(item)"
          class="group relative aspect-[3/4] overflow-hidden rounded-3xl shadow-lg cursor-pointer">
          <img 
            [src]="item.url" 
            [alt]="item.title"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
          >
          <div class="absolute inset-0 bg-gradient-to-t from-secondary-900/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
            <span class="text-white text-xs md:text-sm font-medium">{{ item.title }}</span>
          </div>
        </div>
      }
    </div>

  </div>

  <!-- Image Lightbox Modal for Preview -->
  @if (selectedImage) {
    <div 
      class="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10 animate-in fade-in duration-300"
      (click)="closeImage()"
    >
      <div class="absolute inset-0 bg-secondary-900/95 backdrop-blur-md"></div>
      
      <div 
        class="relative max-w-5xl w-full max-h-full flex flex-col items-center justify-center z-10"
        (click)="$event.stopPropagation()"
      >
        <button 
          (click)="closeImage()"
          class="absolute -top-12 right-0 md:-right-12 text-white hover:text-primary-400 transition-colors p-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <div class="relative w-full overflow-hidden rounded-2xl shadow-2xl bg-secondary-800 flex items-center justify-center">
          <img 
            [src]="selectedImage.url" 
            [alt]="selectedImage.title"
            class="max-w-full max-h-[75vh] object-contain animate-in zoom-in duration-500"
          >
        </div>

        <div class="mt-6 text-center text-white">
          <h3 class="text-2xl font-serif font-bold italic">{{ selectedImage.title }}</h3>
        </div>
      </div>
    </div>
  }
</section>
