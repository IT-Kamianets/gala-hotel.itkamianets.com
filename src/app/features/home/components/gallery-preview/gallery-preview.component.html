<section class="py-24 bg-white">
  <div class="container mx-auto px-4 lg:px-8">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
      <div class="space-y-4">
        <h2 class="text-3xl md:text-5xl font-serif font-bold text-secondary-900 italic">
          {{ 'home.gallery.title' | translate }}
        </h2>
        <div class="h-1 w-20 bg-primary-500 rounded-full"></div>
      </div>
      
      <a routerLink="/gallery" class="group flex items-center space-x-3 text-secondary-600 font-bold hover:text-primary-600 transition-colors">
        <span class="text-lg">{{ 'home.gallery.more_link' | translate }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </a>
    </div>

    <!-- Masonry-like Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (image of previewImages; track image.url; let i = $index) {
        <div 
          (click)="openImage(image)"
          class="relative group cursor-pointer overflow-hidden rounded-[2rem] aspect-[4/5] shadow-sm hover:shadow-2xl transition-all duration-700"
          [class.lg:mt-12]="i % 2 !== 0"
        >
          <img 
            [src]="image.url" 
            [alt]="image.title | translate"
            class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110"
          >
          
          <!-- Overlay -->
          <div class="absolute inset-0 bg-gradient-to-t from-secondary-900/80 via-secondary-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col justify-end p-8">
            <p class="text-white text-lg font-serif font-bold italic transform translate-y-4 group-hover:translate-y-0 transition-transform duration-500">
              {{ image.title | translate }}
            </p>
            <div class="mt-4 w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white transform scale-50 opacity-0 group-hover:scale-100 group-hover:opacity-100 transition-all duration-500 delay-100">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
              </svg>
            </div>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Lightbox -->
  @if (selectedImage) {
    <div 
      class="fixed inset-0 z-[100] bg-secondary-950/95 backdrop-blur-xl flex items-center justify-center p-4 md:p-12 animate-in fade-in duration-300"
      (click)="closeImage()"
    >
      <button 
        (click)="closeImage()"
        class="absolute top-8 right-8 text-white/50 hover:text-white transition-colors p-2"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <div class="max-w-5xl w-full" (click)="$event.stopPropagation()">
        <div class="relative rounded-3xl overflow-hidden shadow-2xl ring-1 ring-white/10">
          <img 
            [src]="selectedImage.url" 
            [alt]="selectedImage.title | translate"
            class="w-full h-auto max-h-[80vh] object-contain bg-secondary-900"
          >
        </div>

        <div class="mt-6 text-center text-white">
          <h3 class="text-2xl font-serif font-bold italic">{{ selectedImage.title | translate }}</h3>
        </div>
      </div>
    </div>
  }
</section>
