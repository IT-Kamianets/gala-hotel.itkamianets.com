<section class="py-24 bg-white">
  <div class="container mx-auto px-4 lg:px-8">
    
    <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
      <div class="space-y-4">
        <h2 class="text-3xl md:text-4xl font-serif font-bold text-secondary-900 leading-tight italic">
          Погляньте на наш затишок
        </h2>
        <div class="w-20 h-1 bg-primary-500 rounded-full"></div>
      </div>
      <a routerLink="/gallery" class="text-primary-600 font-bold hover:text-primary-700 transition-colors flex items-center group text-sm md:text-base">
        Перейти до повної галереї
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </a>
    </div>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
      @for (item of previewImages; track item.url) {
        <div class="group relative aspect-[3/4] overflow-hidden rounded-3xl shadow-lg cursor-pointer">
          <img 
            [src]="item.url" 
            [alt]="item.title"
            class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
          >
          <div class="absolute inset-0 bg-gradient-to-t from-secondary-900/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
            <span class="text-white text-xs md:text-sm font-medium">{{ item.title }}</span>
          </div>
        </div>
      }
    </div>

  </div>
</section>
