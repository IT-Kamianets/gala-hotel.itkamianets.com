<section class="relative h-screen flex flex-col justify-center pt-16 overflow-hidden">
  
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-gradient-to-r from-secondary-900/90 via-secondary-900/40 to-transparent z-10"></div>
    <img 
      src="gallery/1.png" 
      alt="Gala Hotel Exterior" 
      class="w-full h-full object-cover scale-105 animate-pulse-slow"
    >
  </div>

  <!-- Hero Content -->
  <div class="container mx-auto px-4 lg:px-8 relative z-20">
    <div class="max-w-2xl">
      <!-- Main Title - Scaled Down -->
      <h1 class="text-3xl md:text-4xl lg:text-5xl font-serif font-bold text-white leading-tight mb-4 drop-shadow-xl">
        {{ 'home.hero.title' | translate }}
      </h1>
      
      <!-- Subtitle - Scaled Down -->
      <p class="text-base md:text-lg text-secondary-100 mb-8 leading-relaxed font-light max-w-xl drop-shadow-md">
        {{ 'home.hero.subtitle' | translate }}
      </p>

      <!-- Buttons - More Compact -->
      <div class="flex flex-col sm:flex-row space-y-3 sm:space-y-0 sm:space-x-4 mb-10">
        <button class="bg-primary-600 text-white px-7 py-3 rounded-lg font-bold text-sm hover:bg-primary-700 transition-all shadow-lg flex items-center justify-center group active:scale-95">
          {{ 'home.hero.book' | translate }}
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
          </svg>
        </button>
        <button class="bg-white/10 backdrop-blur-md border border-white/20 text-white px-7 py-3 rounded-lg font-bold text-sm hover:bg-white hover:text-secondary-900 transition-all active:scale-95">
          {{ 'home.hero.services' | translate }}
        </button>
      </div>

      <!-- Quick Stats - Compact Grid -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-6 border-t border-white/20">
        <div class="flex flex-col">
          <span class="text-primary-400 text-xl font-bold font-serif">4.3</span>
          <span class="text-secondary-300 text-[9px] uppercase tracking-wider font-semibold">{{ 'home.hero.rating_label' | translate }}</span>
        </div>
        <div class="flex flex-col">
          <span class="text-primary-400 text-xl font-bold font-serif">24/7</span>
          <span class="text-secondary-300 text-[9px] uppercase tracking-wider font-semibold">{{ 'home.hero.reception_label' | translate }}</span>
        </div>
        <div class="flex flex-col">
          <span class="text-primary-400 text-xl font-bold font-serif">WiFi</span>
          <span class="text-secondary-300 text-[9px] uppercase tracking-wider font-semibold">{{ 'home.hero.wifi_label' | translate }}</span>
        </div>
        <div class="flex flex-col">
          <span class="text-primary-400 text-xl font-bold font-serif">A+</span>
          <span class="text-secondary-300 text-[9px] uppercase tracking-wider font-semibold">{{ 'home.hero.location_label' | translate }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
